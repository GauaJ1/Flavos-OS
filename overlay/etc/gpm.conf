# Flavos OS — GPM Configuration (Console Mouse)
# Mouse no console: permite selecionar/copiar texto nos TTYs.
# ATENÇÃO: GPM não produz cursor gráfico. Funcionalidade de terminal apenas.
#
# device: dispositivo de input consolidado do kernel (mice agrega todos os mouses)
# type: imps2 cobre mouse USB (emulado como IntelliMouse PS/2) e PS/2 real
device=/dev/input/mice
type=imps2
