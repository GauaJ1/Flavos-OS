# Flavos OS - System Motion & Compositor Configuration
# Alinhado com a skill: system-motion-design.md
# "Keep the system feeling intentional, calm, and premium."

# --- Fading (Motion) ---
# A duração alvo é ~140-180ms para subidas de menu e janelas.
# delta = tempo do frame em ms. step = quanto cresce por frame (0-1).
# 4ms delta com 0.03 step = ~33 frames para totalizar 100% -> ~132ms total.
fading = true;
fade-delta = 5;
fade-in-step = 0.025;
fade-out-step = 0.04;

# "Exits: decisive, shorter, less theatrical"
# O Openbox fecha instantaneamente por padrão, mas se o compositor atuar, 
# o fade-out-step igual ao fade-in mantém a suavidade interruptível.

# --- Shadows ---
# Sombras dão percepção de profundidade estrutural sem exagero.
shadow = true;
shadow-radius = 24;
shadow-opacity = 0.5;
shadow-offset-x = -20;
shadow-offset-y = -20;

# Não projetar sombras em peças onde elas causam ruido:
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'tint2'",          # Painel plano "não flutua", fica ancorado.
  "class_g = 'Conky'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- Performance (VM / Low-end rules) ---
# "Performance regressions are product regressions"
# "Avoid heavy use of large live blur on low-end hardware"
backend = "xrender";  # xrender garante compatibilidade absurda em VMs sem GPU passthrough
vsync = true;
blur-background = false;

# --- Corner Radius ---
corner-radius = 8;
round-borders = 1; 
