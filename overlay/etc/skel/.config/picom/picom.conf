# Flavos OS — Compositor (Picom) v3
# Motion tokens: fade ~180ms in / ~130ms out
# Shadow: radius 18, opacity 0.40 — depth without noise
# Corner radius: 10px — consistent with radius.lg system token

backend = "xrender";
vsync = true;
blur-background = false;

# --- Motion: Fade ---
fading = true;
fade-delta = 5;
fade-in-step = 0.028;
fade-out-step = 0.038;

# --- Elevation: Shadow ---
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.40;
shadow-offset-x = -16;
shadow-offset-y = -16;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'tint2'",
  "class_g = 'Conky'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Força cantos arredondados na OSD mesmo sendo POPUP
rounded-corners-exclude = [
  "class_g = 'tint2'"
];

# --- Shape: Corners ---
corner-radius = 10;
round-borders = 1;
detect-rounded-corners = true;
detect-client-opacity = true;
