# Flavos OS — Compositor (Picom) v4
# Backend GLX: elimina tearing no X11 sem VSync forçado por software
# Fade otimizado: mais rápido para não parecer 1fps
# Shadow: radius 14, mais próximo da janela (menos spread visual)

backend = "xrender";
vsync = false;
use-damage = false;
glx-no-stencil = true;
glx-copy-from-front = false;

# --- Motion: Fade otimizado ---
# fade-delta menor = frame mais frequente = animação mais suave
fading = true;
fade-delta = 3;
fade-in-step = 0.06;
fade-out-step = 0.08;

# --- Elevation: Shadow ---
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.35;
shadow-offset-x = -12;
shadow-offset-y = -12;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'tint2'",
  "class_g = 'Conky'",
  "class_g = 'FlavosOSD'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Exclui OSD e desktop do pcmanfm de cantos arredondados
rounded-corners-exclude = [
  "class_g = 'tint2'",
  "class_g = 'Pcmanfm' && _NET_WM_WINDOW_TYPE@:a *= 'DESKTOP'"
];

# --- Shape: Corners ---
corner-radius = 10;
round-borders = 1;
detect-rounded-corners = true;
detect-client-opacity = true;
