[config]
bm_open_method=0
su_cmd=lxpolkit
terminal=kitty

[volume]
mount_on_startup=1
mount_removable=1
autorun=1

[desktop]
wallpaper_mode=stretch
wallpaper_common=1
wallpaper=/usr/share/flavos/wallpaper.jpeg
desktop_bg=#0D1017
desktop_fg=#E8ECF4
desktop_shadow=#0D1017
desktop_font=Inter Medium 10
show_wm_menu=1
sort=mtime;ascending;
show_documents=0
show_trash=1
show_mounts=1

[ui]
always_show_tabs=0
max_tab_chars=32
win_width=640
win_height=480
splitter_pos=150
media_in_new_tab=0
desktop_folder_new_win=0
confirm_delete=1
empty_view_as_folder=0
sort=name;ascending;
show_hidden=0
sort_folder_first=1
sort_case_sensitive=0
view_mode=icon
show_toolbar=1
pathbar_mode_buttons=0
