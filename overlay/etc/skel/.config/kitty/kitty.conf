# Flavos OS — Kitty Terminal Config v3
# Tokens aplied: surface=#151921 fg.primary=#E8ECF4 accent=#4B8BF5

# --- Appearance ---
font_family      Inter
bold_font        Inter Bold
italic_font      auto
bold_italic_font auto
font_size        10.0

# --- Window ---
window_padding_width 12
confirm_os_window_close 0

# --- Colors (Design System v3) ---
background #151921
foreground #E8ECF4
cursor     #4B8BF5
cursor_text_color background

selection_background #232838
selection_foreground #E8ECF4

# black
color0  #1C2030
color8  #505872

# red
color1  #F87171
color9  #F87171

# green
color2  #34D399
color10 #34D399

# yellow
color3  #FBBF24
color11 #FBBF24

# blue
color4  #4B8BF5
color12 #4B8BF5

# magenta
color5  #A78BFA
color13 #A78BFA

# cyan
color6  #38BDF8
color14 #38BDF8

# white
color7  #8891A5
color15 #E8ECF4

# --- Clipboard & Selection ---
# Selecionar com mouse copia automaticamente para clipboard
copy_on_select clipboard
# Integração com clipboard do X11
clipboard_control write-clipboard write-primary read-clipboard read-primary

# --- Keybindings ---
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+s paste_from_selection
map shift+insert  paste_from_selection
