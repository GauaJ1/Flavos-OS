# Flavos OS — Resolução padrão para VM
# Limita a resolução do X11 a 800x600 para caber em telas de desenvolvimento.
# Pode ser alterado ou removido para hardware real.

Section "Screen"
    Identifier "Default Screen"
    Monitor    "Default Monitor"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "800x600"
    EndSubSection
EndSection

Section "Monitor"
    Identifier "Default Monitor"
EndSection
