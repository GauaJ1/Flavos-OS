# Flavos OS — Picom config: PERFIL BALANCEADO (padrão)
# Alvo: 4 GB RAM, hardware pós-2013, GPU integrada com OpenGL funcional
# Backend: xrender — mantido por estabilidade até validação em hardware real (Etapa 14)
# Comportamento: identidade visual Flavos completa sem efeitos caros
#
# Rollback: se houver flicker/glitch no use-damage: use-damage = false

backend = "xrender";
vsync = false;

# Damage tracking ativo: reduz redesenho desnecessário
# Rollback se flicker/glitch: use-damage = false
use-damage = true;

glx-no-stencil = true;
glx-copy-from-front = false;

# --- Motion: Fade otimizado ---
fading = true;
fade-delta = 3;
fade-in-step = 0.06;
fade-out-step = 0.08;

# --- Elevation: Shadow ---
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.35;
shadow-offset-x = -12;
shadow-offset-y = -12;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'tint2'",
  "class_g = 'Conky'",
  "class_g = 'FlavosOSD'",
  "_GTK_FRAME_EXTENTS@:c"
];

rounded-corners-exclude = [
  "class_g = 'tint2'"
];

# --- Shape: Corners ---
corner-radius = 10;
round-borders = 1;
detect-rounded-corners = true;
detect-client-opacity = true;
