# Flavos OS — Picom config: PERFIL LEVE
# Alvo: 2 GB RAM, hardware legado (LGA775, GPU pré-OpenGL 2.0 confiável)
# Backend: xrender — mais estável em hardware muito antigo que pode ter driver OpenGL incompleto
# Objetivo: menor overhead visual possível, manter tearing-free
#
# Rollback: se houver artefatos visuais, desabilitar use-damage: use-damage = false

backend = "xrender";
vsync = false;

# Damage tracking: redesenho parcial (não tela inteira por frame)
# Rollback se flicker/glitch: use-damage = false
use-damage = true;

glx-no-stencil = true;
glx-copy-from-front = false;

# --- Motion: Desabilitado no Leve ---
# Fading desativado reduz frames desnecessários em GPU fraca
fading = false;

# --- Elevation: Shadow mínima ---
# Radius reduzido e opacidade baixa: presença mínima sem custo visual alto
shadow = true;
shadow-radius = 6;
shadow-opacity = 0.20;
shadow-offset-x = -5;
shadow-offset-y = -5;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'tint2'",
  "class_g = 'Conky'",
  "class_g = 'FlavosOSD'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- Shape: Sem cantos arredondados no Leve ---
# corner-radius tem custo em GPU fraca
corner-radius = 0;
round-borders = 0;
detect-rounded-corners = false;
detect-client-opacity = true;
