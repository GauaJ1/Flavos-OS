# Flavos OS — Picom config: PERFIL COMPLETO (Full)
# Alvo: 8 GB+ RAM, hardware moderno, GPU com contexto OpenGL 2.0+ estável
# Backend: glx — melhor desempenho em hardware com aceleração gráfica funcional
#
# REQUER: driver gráfico com OpenGL 2.0+ e contexto GLX estável.
# Drivers Intel/AMD modernos no Debian Bookworm atendem.
# Em VMs ou GPUs virtuais sem aceleração GLX adequada (llvmpipe, swrast,
# softpipe), o flavos-performance-profile faz FALLBACK AUTOMÁTICO para a
# config Balanced (xrender), sem alterar este arquivo.
# Alguns setups VM com virtio/virgl podem expor GLX funcional — nesses casos
# o perfil Full será aplicado normalmente.
#
# Blur: desabilitado nesta versão. Reservado para avaliação pós-Etapa 14.

backend = "glx";
vsync = true;

# Damage tracking ativo
# Rollback se flicker/glitch: use-damage = false
use-damage = true;

glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# --- Motion: Fade rico ---
fading = true;
fade-delta = 4;
fade-in-step = 0.05;
fade-out-step = 0.07;

# --- Elevation: Shadow completa ---
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.45;
shadow-offset-x = -14;
shadow-offset-y = -14;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'tint2'",
  "class_g = 'Conky'",
  "class_g = 'FlavosOSD'",
  "_GTK_FRAME_EXTENTS@:c"
];

rounded-corners-exclude = [
  "class_g = 'tint2'"
];

# --- Shape: Corners maiores ---
corner-radius = 12;
round-borders = 1;
detect-rounded-corners = true;
detect-client-opacity = true;
