# Flavos OS — Picom config: PERFIL COMPLETO
# Alvo: 8 GB+ RAM, hardware moderno, GPU com OpenGL 2.0+ confiável
# Backend: glx — melhor desempenho em hardware com OpenGL funcional
#
# ATENÇÃO: glx requer driver gráfico com suporte OpenGL 2.0 estável.
# No Debian Bookworm, drivers Intel/AMD modernos atendem. GPU pré-2012 pode
# exigir fallback para xrender. Validar em hardware real na Etapa 14.
# Rollback: substituir backend por "xrender" se houver glitches/crashes.
#
# Blur: desabilitado nesta versão. Reservado para avaliação pós-Etapa 14.

backend = "glx";
vsync = true;

# Damage tracking ativo
# Rollback se flicker/glitch: use-damage = false
use-damage = true;

glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# --- Motion: Fade rico ---
fading = true;
fade-delta = 4;
fade-in-step = 0.05;
fade-out-step = 0.07;

# --- Elevation: Shadow completa ---
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.45;
shadow-offset-x = -14;
shadow-offset-y = -14;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'tint2'",
  "class_g = 'Conky'",
  "class_g = 'FlavosOSD'",
  "_GTK_FRAME_EXTENTS@:c"
];

rounded-corners-exclude = [
  "class_g = 'tint2'"
];

# --- Shape: Corners maiores ---
corner-radius = 12;
round-borders = 1;
detect-rounded-corners = true;
detect-client-opacity = true;
