
# Flavos OS — Build Configuration
# Variáveis globais usadas por todos os scripts de build.

# Identidade
FLAVOS_NAME="Flavos OS"
FLAVOS_ID="flavos"
FLAVOS_VERSION="0.1-preview"
FLAVOS_CODENAME="basis"

# Base
DEBIAN_SUITE="bookworm"
DEBIAN_MIRROR="http://deb.debian.org/debian"
ARCH="amd64"

# Imagem (build interno — nome usado pelos scripts 01-04)
IMAGE_SIZE="4G"
IMAGE_NAME="flavos-0.1-basis-amd64.img"
ESP_SIZE_MB=256
ROOT_FS="ext4"

# Release naming (artefatos públicos — Etapa 14A)
RELEASE_VERSION="0.1"
RELEASE_MILESTONE="desktop-preview"
RELEASE_TAG="daily"
RELEASE_IMAGE_BASENAME="FlavosOS-${RELEASE_MILESTONE}-${RELEASE_VERSION}-${RELEASE_TAG}-${ARCH}"

# Paths (relativos à raiz do projeto)
BUILD_DIR="build"
ROOTFS_DIR="${BUILD_DIR}/rootfs"
IMAGE_PATH="${BUILD_DIR}/${IMAGE_NAME}"
OVERLAY_DIR="overlay"
CONFIG_DIR="config"

# QEMU
QEMU_RAM="2048"
QEMU_CPUS="3"
OVMF_CODE="/usr/share/OVMF/OVMF_CODE_4M.fd"

# Credenciais — carregadas de config/.secrets
# Fallback DevLocal se .secrets não existir.
_SECRETS_FILE="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/.secrets"
if [[ -f "$_SECRETS_FILE" ]]; then
    source "$_SECRETS_FILE"
else
    # Fallback DevLocal — NÃO SEGURO para publicação.
    ROOT_PASSWORD="flavos"
    SYS_USER="flavos"
    SYS_PASSWORD="123"
fi

# Localização e Identidade Textual (Etapa 7A)
SYS_LOCALE="en_US.UTF-8"
SYS_TIMEZONE="America/Sao_Paulo"
SYS_KEYMAP="br-abnt2"
