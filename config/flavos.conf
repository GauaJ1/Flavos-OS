
# Flavos OS — Build Configuration
# Variáveis globais usadas por todos os scripts de build.

# Identidade
FLAVOS_NAME="Flavos OS"
FLAVOS_ID="flavos"
FLAVOS_VERSION="0.1.0"
FLAVOS_CODENAME="ignition"

# Base
DEBIAN_SUITE="bookworm"
DEBIAN_MIRROR="http://deb.debian.org/debian"
ARCH="amd64"

# Imagem
IMAGE_SIZE="2G"
IMAGE_NAME="flavos.img"
ESP_SIZE_MB=256
ROOT_FS="ext4"

# Paths (relativos à raiz do projeto)
BUILD_DIR="build"
ROOTFS_DIR="${BUILD_DIR}/rootfs"
IMAGE_PATH="${BUILD_DIR}/${IMAGE_NAME}"
OVERLAY_DIR="overlay"
CONFIG_DIR="config"

# QEMU
QEMU_RAM="1024"
QEMU_CPUS="2"
OVMF_CODE="/usr/share/OVMF/OVMF_CODE_4M.fd"

# Root password para V1 (desenvolvimento apenas)
# Em produção, substituir por mecanismo seguro.
ROOT_PASSWORD="flavos"

# Usuário de sistema primário e senha (não-root)
SYS_USER="flavos"
SYS_PASSWORD="123"

# Localização e Identidade Textual (Etapa 7A)
SYS_LOCALE="en_US.UTF-8"
SYS_TIMEZONE="America/Sao_Paulo"
SYS_KEYMAP="br-abnt2"
